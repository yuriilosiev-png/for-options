<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a" id="theme-color-meta">
<meta name="x5-fullscreen" content="true">
<meta name="360-fullscreen" content="true">
<meta name="x5-page-mode" content="app">
<meta name="browsermode" content="application">
<link rel="manifest" href="manifest.json">
<title>Options Analyst Pro</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1424;
  --bg3: #141929;
  --bg4: #1a2035;
  --border: #1e2840;
  --border2: #253050;
  --accent: #f0a500;
  --accent2: #e8870a;
  --green: #00d68f;
  --red: #ff4d6a;
  --blue: #3d7fff;
  --purple: #a855f7;
  --text: #e2e8f8;
  --text2: #8a97b8;
  --text3: #5a6585;
  --panel: #111827;
  --slider-h: 6px;
  --radius: 10px;
  --font: 'JetBrains Mono', 'Courier New', monospace;
  --font2: 'Segoe UI', system-ui, sans-serif;
}

body.light {
  --bg: #f0f2f8;
  --bg2: #e8eaf2;
  --bg3: #dde0ee;
  --bg4: #d0d4e8;
  --border: #c0c6dc;
  --border2: #a8b0cc;
  --accent: #d08000;
  --accent2: #b86e00;
  --green: #00a86b;
  --red: #e0304a;
  --blue: #2060d0;
  --purple: #8030d0;
  --text: #0a0e1a;
  --text2: #3a4468;
  --text3: #6a74a0;
  --panel: #e0e4f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; overflow: hidden; overscroll-behavior: none; }

body {
  height: 100%;
  width: 100%;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font2);
  font-size: 13px;
  overflow: hidden;
  overscroll-behavior: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  touch-action: pan-x pan-y;
}

#topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  height: 48px;
  flex-shrink: 0;
}
#logo { font-family: var(--font); font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
.exchange-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 12px;
  transition: all .2s;
}
.exchange-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
#asset-select {
  background: var(--bg4); border: 1px solid var(--border2); color: var(--text);
  padding: 5px 8px; border-radius: 6px; font-size: 12px; margin-left: 4px;
}
#price-badge {
  margin-left: auto; font-family: var(--font); font-size: 13px; color: var(--green);
  background: rgba(0,214,143,.1); padding: 4px 10px; border-radius: 6px;
  border: 1px solid rgba(0,214,143,.2);
}
#connect-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--accent);
  background: transparent; color: var(--accent); cursor: pointer; font-size: 12px;
  white-space: nowrap;
}

#strategy-bar {
  display: flex; gap: 5px; padding: 5px 10px; overflow-x: auto;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; scrollbar-width: none; align-items: stretch;
}
#strategy-bar::-webkit-scrollbar { display: none; }
.strat-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 5px 8px 4px; border-radius: 6px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--text3); cursor: pointer;
  font-size: 9px; white-space: nowrap; transition: all .2s;
  min-width: 58px; flex-shrink: 0; letter-spacing: 0.2px;
}
.strat-btn svg { display: block; flex-shrink: 0; overflow: visible; }
.strat-btn:hover { border-color: var(--border2); background: var(--bg4); color: var(--text2); }
.strat-btn.active {
  background: var(--bg4); color: var(--accent);
  border-color: var(--accent);
}

#legs-section {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; max-height: 160px; overflow-y: auto;
}
#legs-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
#legs-header span { font-size: 11px; color: var(--text2); }
#legs-count { color: var(--accent); font-weight: 700; }
.leg-action-btn {
  padding: 4px 10px; border-radius: 5px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--border2); background: var(--bg4); color: var(--text2);
  white-space: nowrap;
}
.leg-action-btn.primary { border-color: var(--accent); color: var(--accent); }
.leg-action-btn.import-btn { border-color: var(--blue); color: var(--blue); }
#legs-table { width: 100%; border-collapse: collapse; font-size: 11px; }
#legs-table th {
  padding: 5px 8px; text-align: left; color: var(--text3);
  border-bottom: 1px solid var(--border); background: var(--bg3);
  white-space: nowrap; font-weight: 500;
}
#legs-table td {
  padding: 6px 8px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
#legs-table tr:last-child td { border-bottom: none; }
.leg-type-call { color: var(--green); font-weight: 600; }
.leg-type-put { color: var(--red); font-weight: 600; }
.leg-dir-buy { color: var(--green); }
.leg-dir-sell { color: var(--red); }
.del-leg-btn {
  padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(255,77,106,.3);
  background: rgba(255,77,106,.1); color: var(--red); cursor: pointer; font-size: 10px;
}
.leg-select {
  background: var(--bg4); border: 1px solid var(--border2); color: var(--text);
  padding: 2px 4px; border-radius: 4px; font-size: 11px;
}

#main {
  display: flex; flex: 1; overflow: hidden; min-height: 0;
}

#price-slider-wrap {
  display: flex; flex-direction: column; align-items: center;
  width: 48px; background: var(--bg3); border-right: 1px solid var(--border);
  padding: 8px 0 8px 8px; flex-shrink: 0; position: relative;
  overflow: hidden; touch-action: none;
}
#price-label-top { font-size: 9px; color: var(--text3); writing-mode: horizontal-tb; margin-bottom: 4px; flex-shrink: 0; text-align: center; white-space: nowrap; }

#price-slider-v {
  -webkit-appearance: none; appearance: none;
  writing-mode: vertical-lr; direction: rtl;
  flex: 1;
  width: 6px;
  min-height: 60px;
  background: transparent;
  height: auto !important;
  align-self: stretch;
  pointer-events: none;
}
#price-slider-v::-webkit-slider-runnable-track {
  width: var(--slider-h); background: var(--border2); border-radius: 3px;
}
#price-slider-v::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px;
  background: var(--accent); border-radius: 50%; margin-left: -6px;
  border: 2px solid var(--bg); box-shadow: 0 0 8px rgba(240,165,0,.5);
}
#price-val-badge {
  font-family: var(--font); font-size: 9px; color: var(--accent);
  background: rgba(240,165,0,.15); padding: 2px 3px; border-radius: 3px;
  writing-mode: horizontal-tb; text-align: center; margin-top: 4px; flex-shrink: 0;
}

#chart-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
#chart-canvas-wrap { flex: 1; position: relative; min-height: 0; }
#pnl-canvas { width: 100%; height: 100%; display: block; }

#chart-tooltip {
  position: absolute; pointer-events: none;
  background: var(--bg4); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px; font-size: 11px;
  display: none; z-index: 10;
}
#chart-tooltip .tt-price { color: var(--accent); font-weight: 700; font-family: var(--font); }
#chart-tooltip .tt-pnl { font-weight: 700; }
#chart-tooltip .tt-pnl.pos { color: var(--green); }
#chart-tooltip .tt-pnl.neg { color: var(--red); }

#iv-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px; background: var(--bg3); border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text3); flex-shrink: 0;
}
#iv-slider { flex: 1; accent-color: var(--purple); }
#iv-val { color: var(--purple); font-family: var(--font); font-weight: 700; min-width: 40px; }

#time-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: var(--bg2); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#time-slider { flex: 1; accent-color: var(--blue); }
#time-val { font-family: var(--font); font-size: 10px; color: var(--blue); min-width: 55px; text-align: right; }
.time-label { font-size: 10px; color: var(--text3); white-space: nowrap; }

#right-panel {
  width: 130px; background: var(--bg2); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
}
.rp-section { padding: 8px; border-bottom: 1px solid var(--border); }
.rp-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.rp-pnl-val {
  font-family: var(--font); font-size: 16px; font-weight: 700;
  line-height: 1.2;
}
.rp-pnl-val.pos { color: var(--green); }
.rp-pnl-val.neg { color: var(--red); }
.rp-pnl-val.zero { color: var(--text2); }
.rp-pnl-sub { font-size: 9px; color: var(--text3); margin-top: 2px; }
.greek-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.greek-item { flex: 1; }
.greek-name { font-size: 9px; color: var(--text3); }
.greek-val { font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--text); }
.greek-val.pos { color: var(--green); }
.greek-val.neg { color: var(--red); }
.rr-bar-wrap { margin-top: 4px; }
.rr-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 3px; }
.rr-bar-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--accent), var(--green)); border-radius: 3px; transition: width .3s; }
.rr-val { font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--accent); }
.rp-stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 10px; }
.rp-stat-key { color: var(--text3); }
.rp-stat-val { font-family: var(--font); color: var(--text); }
.rp-stat-val.pos { color: var(--green); }
.rp-stat-val.neg { color: var(--red); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--bg2); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 480px; max-height: 85vh;
  overflow-y: auto; padding: 16px;
  transform: translateY(40px); transition: transform .25s;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--accent); }
.form-row { margin-bottom: 10px; }
.form-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; }
.form-input {
  width: 100%; background: var(--bg4); border: 1px solid var(--border2);
  color: var(--text); padding: 8px 10px; border-radius: 7px; font-size: 13px;
}
.form-select {
  width: 100%; background: var(--bg4); border: 1px solid var(--border2);
  color: var(--text); padding: 8px 10px; border-radius: 7px; font-size: 13px;
}
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; }
.modal-btn {
  flex: 1; padding: 10px; border-radius: 8px; font-size: 13px;
  font-weight: 600; cursor: pointer; border: none; transition: all .2s;
}
.modal-btn.confirm { background: var(--accent); color: #000; }
.modal-btn.cancel { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); }

#connect-modal .tab-row { display: flex; gap: 6px; margin-bottom: 12px; }
#connect-modal .tab-btn {
  flex: 1; padding: 8px; border-radius: 7px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 12px;
  transition: all .2s; text-align: center;
}
#connect-modal .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

#chart-legend {
  position: absolute; top: 8px; left: 8px; display: flex; gap: 10px;
  font-size: 10px; pointer-events: none;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 20px; height: 2px; border-radius: 1px; }
.legend-dot.today { background: var(--red); }
.legend-dot.expiry { background: var(--accent); border-top: 2px dashed var(--accent); background: none; }

#app {
  display: flex; flex-direction: column;
  height: 100%;
  overflow: hidden;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left: env(safe-area-inset-left, 0px);
  padding-right: env(safe-area-inset-right, 0px);
}
#body-row {
  display: flex; flex: 1; min-height: 0; flex-direction: column;
}
#chart-row {
  display: flex; flex: 1; min-height: 0;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

#theme-btn {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--bg4); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s;
}
#theme-btn:active { background: var(--accent); color: #000; }

#rotate-btn {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--bg4); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s;
}

@media (orientation: landscape) and (max-height: 500px) {
  #topbar { height: 38px; padding: 4px 10px; }
  #logo { font-size: 13px; }
  #strategy-bar { padding: 3px 8px; gap: 4px; }
  .strat-btn { padding: 3px 7px 2px; font-size: 9px; min-width: 52px; }
  .strat-btn svg { width: 44px; height: 20px; }
  #legs-section { max-height: 100px; }
  #legs-header { padding: 4px 10px; }
  #legs-table th, #legs-table td { padding: 3px 6px; font-size: 10px; }
  #right-panel { width: 115px; }
  .rp-section { padding: 5px 7px; }
  .rp-label { font-size: 8px; margin-bottom: 2px; }
  .rp-pnl-val { font-size: 13px; }
  .greek-val { font-size: 10px; }
  .greek-name { font-size: 8px; }
  .rp-stat-row { font-size: 9px; margin-bottom: 2px; }
  .rr-val { font-size: 11px; }
  #time-bar { padding: 3px 8px; }
  #iv-bar { padding: 2px 8px; }
  #price-slider-wrap { width: 52px; padding-left: 8px; }
  #price-label-top { font-size: 8px; }
  #price-val-badge { font-size: 8px; }
  #history-topbar { min-height: 34px; padding: 4px 10px; }
  #history-topbar .h-title { font-size: 12px; }
  .h-close-btn { width: 28px; height: 28px; font-size: 16px; }
  #history-period-bar { padding: 3px 10px; gap: 4px; }
  .period-btn { padding: 3px 9px; font-size: 10px; }
  #history-chart-wrap { height: 110px; }
  .h-sum-item { padding: 3px 7px; font-size: 9px; }
  .h-sum-val { font-size: 11px; }
  #history-table-wrap { overflow-x: auto; }
  #history-table { font-size: 10px; }
  #history-table th, #history-table td { padding: 3px 6px; }
}

@media (orientation: portrait) and (max-width: 480px) {
  #logo { font-size: 12px; letter-spacing: 0; }
  #topbar {
    gap: 3px; padding: 5px 6px;
    max-width: 100vw; overflow-x: auto; overflow-y: hidden;
    flex-wrap: nowrap; scrollbar-width: none;
  }
  #topbar::-webkit-scrollbar { display: none; }
  #price-badge {
    font-size: 9px; padding: 3px 4px; margin-left: auto;
    flex-shrink: 0; white-space: nowrap;
  }
  .exchange-btn { padding: 4px 6px; font-size: 9px; flex-shrink: 0; }
  #asset-select { padding: 4px 3px; font-size: 9px; margin-left: 0; flex-shrink: 0; }
  #delta-pill { display: none !important; }
  #rotate-btn { display: none; }
  #balance-badge { display: none !important; }
  #theme-btn { width: 26px; height: 26px; font-size: 13px; flex-shrink: 0; }
  #connect-btn { padding: 4px 6px; font-size: 10px; flex-shrink: 0; }
  #right-panel { width: 100px; }
  .rp-pnl-val { font-size: 13px; }
  .greek-val { font-size: 10px; }
  .greek-name { font-size: 8px; }
  .rp-stat-row { font-size: 9px; }
  .rp-section { padding: 6px; }
  .rp-label { font-size: 8px; }
  #history-table-wrap { overflow-x: auto; }
  #history-table { font-size: 10px; }
  #history-table th, #history-table td { padding: 4px 7px; }
}

.be-label { font-size: 9px; fill: var(--text3); }

#delta-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.3);
  color: var(--purple); font-size: 10px; margin-left: auto;
  white-space: nowrap; cursor: pointer;
}

#balance-badge {
  font-family: var(--font); font-size: 11px;
  background: rgba(61,127,255,.1); padding: 4px 8px; border-radius: 6px;
  border: 1px solid rgba(61,127,255,.25); white-space: nowrap;
  display: flex; align-items: center; gap: 3px;
}
#balance-equity { color: var(--green); font-weight: 700; }
#balance-avail  { color: var(--blue);  font-weight: 600; }

#history-modal {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg); display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#history-modal.open { opacity: 1; pointer-events: all; }

#history-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 48px;
}
#history-topbar .h-title { font-size: 14px; font-weight: 700; color: var(--accent); flex: 1; }
.h-balance-block { font-size: 11px; font-family: var(--font); text-align: right; }
.h-balance-block .hb-eq { color: var(--green); font-weight: 700; }
.h-balance-block .hb-av { color: var(--blue); }
.h-close-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg4); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

#history-period-bar {
  display: flex; gap: 6px; padding: 6px 12px;
  background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.period-btn {
  padding: 4px 12px; border-radius: 16px; font-size: 11px;
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text2); cursor: pointer; transition: all .2s;
}
.period-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); font-weight: 700; }

#history-chart-wrap {
  flex-shrink: 0; height: 200px; position: relative;
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
#history-canvas { width: 100%; height: 100%; display: block; }

#history-summary {
  display: flex; gap: 0; flex-shrink: 0;
  border-bottom: 1px solid var(--border); background: var(--bg2);
}
.h-sum-item {
  flex: 1; padding: 6px 10px; border-right: 1px solid var(--border);
  font-size: 10px;
}
.h-sum-item:last-child { border-right: none; }
.h-sum-label { color: var(--text3); margin-bottom: 2px; }
.h-sum-val { font-family: var(--font); font-size: 12px; font-weight: 700; }
.h-sum-val.pos { color: var(--green); }
.h-sum-val.neg { color: var(--red); }
.h-sum-val.neu { color: var(--text); }

#history-table-wrap { flex: 1; overflow-y: auto; }
#history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
#history-table th {
  padding: 5px 8px; text-align: left; color: var(--text3);
  border-bottom: 1px solid var(--border); background: var(--bg3);
  white-space: nowrap; font-weight: 500; position: sticky; top: 0; z-index: 1;
}
#history-table td {
  padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap;
}
#history-table tr:last-child td { border-bottom: none; }
.ht-pnl-pos { color: var(--green); font-family: var(--font); font-weight: 600; }
.ht-pnl-neg { color: var(--red); font-family: var(--font); font-weight: 600; }
#history-loading {
  display: flex; align-items: center; justify-content: center;
  flex: 1; color: var(--text3); font-size: 13px; gap: 8px;
}
#history-error {
  padding: 16px; color: var(--red); font-size: 12px; text-align: center;
}

#positions-modal {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg); display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#positions-modal.open { opacity: 1; pointer-events: all; }
#positions-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 48px;
}
#positions-topbar .p-title { font-size: 14px; font-weight: 700; color: var(--green); flex: 1; }
.p-refresh-btn, .p-close-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg4); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.p-refresh-btn { color: var(--green); }
.p-refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { from {transform:rotate(0)} to {transform:rotate(360deg)} }
#positions-tabs {
  display: flex; gap: 0; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ptab-btn {
  flex: 1; padding: 10px 8px; text-align: center; cursor: pointer;
  font-size: 12px; color: var(--text3); border-bottom: 2px solid transparent;
  transition: all .15s; user-select: none;
}
.ptab-btn:hover { color: var(--text); background: var(--bg3); }
.ptab-btn.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
.ptab-count { font-size: 10px; color: var(--text3); margin-left: 4px; }
.ptab-btn.active .ptab-count { color: var(--green); }
#positions-content { flex: 1; overflow-y: auto; padding: 8px; }
.pos-section { display: none; }
.pos-section.active { display: block; }
.pos-empty, .pos-loading, .pos-error {
  text-align: center; padding: 24px 16px; color: var(--text3); font-size: 13px;
}
.pos-error { color: var(--red); }

.pos-opt-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 10px;
}
.pos-opt-head {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.pos-opt-sym { font-size: 13px; font-weight: 700; color: var(--text); font-family: var(--font); }
.pos-opt-side {
  font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600;
}
.pos-opt-side.long { background: rgba(70,200,120,.15); color: var(--green); }
.pos-opt-side.short { background: rgba(230,80,80,.15); color: var(--red); }
.pos-opt-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0; font-size: 12px;
}
.pos-opt-row .pol { color: var(--text3); }
.pos-opt-row .por { color: var(--text); font-family: var(--font); font-weight: 500; }
.pos-opt-row .por.pos { color: var(--green); }
.pos-opt-row .por.neg { color: var(--red); }
