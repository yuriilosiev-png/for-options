android {
    compileSdkVersion 33
    defaultConfig {
        applicationId "com.options.analyst"
        minSdkVersion 24
        targetSdkVersion 33
        versionCode 10
        versionName "2.0"
    }
    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "options-analyst.jks")
            storePassword System.getenv("STORE_PASSWORD") ?: ""
            keyAlias System.getenv("KEY_ALIAS") ?: "options-analyst"
            keyPassword System.getenv("KEY_PASSWORD") ?: ""
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug { minifyEnabled false }
    }
    ...
}
