name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.5/bin" >> $GITHUB_PATH

      - name: Copy icons to app res
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          cp icon-192.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon-192.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OptionsAnalyst-v1.9
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
